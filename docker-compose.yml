services:
  api:
    build: .
    env_file: .env
    ports:
      - "18080:18080"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./release:/app/release

  worker:
    build: .
    env_file: .env
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info
    depends_on:
      - postgres
      - redis

  beat:
    build: .
    env_file: .env
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=info
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: intel
      POSTGRES_USER: intel
      POSTGRES_PASSWORD: intel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
