services:
  api:
    build: .
    env_file: .env
    environment:
      # 外部情报源健康检测经宿主机 socat 转发器出网(172.19.0.1 是本 compose 网络网关)
      - "OUTBOUND_HTTPS_PROXY=http://host.docker.internal:17890"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "18080:18080"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./release:/app/release
      - /data/ftp/ioc:/data/ftp/ioc

  worker:
    build: .
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info
    depends_on:
      - postgres
      - redis

  beat:
    build: .
    env_file: .env
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=info
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: intel
      POSTGRES_USER: intel
      POSTGRES_PASSWORD: intel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    # 宿主机 6379 已被占用;内部服务经服务名 redis:6379 互联,
    # 对外仅为调试映射到 6380。
    ports:
      - "127.0.0.1:6380:6379"

volumes:
  postgres_data:
