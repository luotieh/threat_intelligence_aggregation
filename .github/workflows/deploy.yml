name: deploy-to-server

# 推送到 master 自动部署到情报服务器(离线 ARM64,dockerd 无法拉基础镜像)。
# 策略:SSH 到服务器,git fetch 拉最新 app/ 源码,基于服务器已有的稳定基座镜像
#       threat-intel-hub:base 叠一层(COPY app),再用 deploy.sh 重建容器。
# 不用 scp/tar(服务器 openEuler 精简版未装 tar),纯 git + docker,离线秒级。
#
# ⚠️ 依赖变更(pyproject.toml)不会通过本流程生效:base 镜像不含新依赖。
#    改依赖时需在能联网的机器上重建并 docker load 出新的 threat-intel-hub:base
#    到服务器(见 release/threat-intel-hub 的打包说明)。
#
# 需在仓库 Settings → Secrets and variables → Actions 配置以下 Secrets:
#   DEPLOY_HOST     服务器公网 IP(例:180.104.100.118)
#   DEPLOY_PORT     SSH 端口(例:22129)
#   DEPLOY_USER     SSH 用户(例:root)
#   DEPLOY_SSH_KEY  专用部署私钥(ed25519,公钥已加入服务器 authorized_keys)

on:
  push:
    branches: [master]
    # 只有应用源码变化才触发部署(改文档不重部署)
    paths:
      - "app/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest app, overlay build & redeploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -eu
            export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH
            PROJ=/home/yt/porjects/threat-intel-hub
            REL="$PROJ/release/threat-intel-hub"

            # 基座镜像必须存在(离线服务器无法从零构建)
            if ! docker image inspect threat-intel-hub:base >/dev/null 2>&1; then
              echo "[!] 缺少 threat-intel-hub:base 基座镜像,无法叠加构建。" >&2
              echo "    请先在服务器执行: docker tag threat-intel-hub:latest threat-intel-hub:base" >&2
              exit 1
            fi

            cd "$PROJ"
            git fetch origin master

            # 把 origin/master 的 app/ 导出到全新空目录再叠层。
            # 不能 checkout 到既有 worktree 再 cp:checkout 只恢复存在的文件,
            # 从不删除该提交里已删掉的文件,陈旧模块会一路打进镜像(rule_archive 就是这么
            # 在服务器上活下来的)。空目录导出让删除天然生效,且不碰服务器本地改动与索引。
            rm -rf /tmp/overlay && mkdir -p /tmp/overlay
            GIT_INDEX_FILE=/tmp/overlay.index git --work-tree=/tmp/overlay checkout -f origin/master -- app
            rm -f /tmp/overlay.index
            test -f /tmp/overlay/app/main.py || { echo "app 导出失败"; exit 1; }
            printf 'FROM threat-intel-hub:base\nCOPY app ./app\n' > /tmp/overlay/Dockerfile
            docker build -t threat-intel-hub:latest /tmp/overlay

            # 离线模式重建容器(端口/目录等取自 release 目录内的 deploy.conf/.env)
            cd "$REL"
            FORCE_BUILD=0 ./deploy.sh

            # 健康检查(端口取自 deploy.conf 的 API_PORT,默认 18080)
            PORT=$(grep -E '^API_PORT=' deploy.conf 2>/dev/null | head -1 | sed 's/[^0-9]*\([0-9]\+\).*/\1/')
            PORT=${PORT:-18080}
            echo "[*] 健康检查 http://127.0.0.1:${PORT}/health"
            curl -fsS "http://127.0.0.1:${PORT}/health" && echo " OK"
